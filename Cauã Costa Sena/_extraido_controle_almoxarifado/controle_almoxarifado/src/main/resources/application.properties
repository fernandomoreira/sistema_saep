# Configurações de Conexão com o MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/almoxarifadodb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Driver do MySQL e Dialeto do Hibernate
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto=validate apenas confere se as tabelas já existem (já que você criou manualmente)
spring.jpa.hibernate.ddl-auto=none

# Exibe os comandos SQL executados no terminal do VS Code
logging.level.org.hibernate.SQL=DEBUG