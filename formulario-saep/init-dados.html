function gerarRespostas01(a) {
  const r = {};
  SAEP01_ACTS.forEach(act => {
    const [nivel, just] = a[act.ai];
    const nivelNum = (nivel !== "S6" && nivel !== "S7") ? Number(nivel) : null;

    Object.entries(act.map).forEach(([k, i]) => {
      const key = `u${act.u}_g${act.g}_i${i}`;

      // Itens S6/S7 ("não realizou" / "tempo esgotado"): sempre Não, sem justificativa
      if (k === "S6" || k === "S7") {
        r[key] = { sim: false, nao: true, justificativa: "" };
        return;
      }

      if (nivelNum === null) {
        // Aluno não realizou a atividade: todos os itens de nível ficam Não
        r[key] = { sim: false, nao: true, justificativa: "Procedimento não localizado" };
      } else {
        const kN = Number(k);
        if (kN === nivelNum) {
          r[key] = { sim: true, nao: false, justificativa: "" };
        } else if (kN < nivelNum) {
          r[key] = { sim: false, nao: true, justificativa: "Nível inferior ao alcançado pelo aluno" };
        } else {
          r[key] = { sim: false, nao: true, justificativa: just };
        }
      }
    });
  });
  return r;
}

// -----------------------------------------------------------------------
// SAEP02 — Mapeamento nivel → índice do item que recebe "Sim" (0-6)
// -----------------------------------------------------------------------
function simIdx(nivel) {
  if (nivel === "S6") return 0;
  if (nivel === "S7") return 1;
  if (nivel === 0)   return 2;
  if (nivel === 1)   return 3;
  if (nivel === 2)   return 4;
  if (nivel === 3)   return 5;
  if (nivel === 4)   return 6;
  return 0;
}

function gerarRespostas(a) {
  const r = {};
  a.forEach(([nivel, just], ai) => {
    // i0 (S6) e i1 (S7): sempre Não, sem justificativa
    r[`a${ai}_i0`] = { sim: false, nao: true, justificativa: "" };
    r[`a${ai}_i1`] = { sim: false, nao: true, justificativa: "" };

    if (nivel === "S6" || nivel === "S7") {
      // Atividade não realizada
      for (let i = 2; i <= 6; i++) {
        r[`a${ai}_i${i}`] = { sim: false, nao: true, justificativa: "Procedimento não localizado" };
      }
    } else {
      const si = simIdx(nivel); // i2-i6
      for (let i = 2; i <= 6; i++) {
        if (i === si) {
          r[`a${ai}_i${i}`] = { sim: true, nao: false, justificativa: "" };
        } else if (i < si) {
          r[`a${ai}_i${i}`] = { sim: false, nao: true, justificativa: "Nível inferior ao alcançado pelo aluno" };
        } else {
          r[`a${ai}_i${i}`] = { sim: false, nao: true, justificativa: just };
        }
      }
    }
  });
  return r;
}

function inicializar() {
  const lista = ALUNOS.map(a => ({ nome: a.nome, cpf: a.cpf }));
  localStorage.setItem("saep_alunos", JSON.stringify(lista));

  ALUNOS.forEach(aluno => {
    const meta = {
      avaliador: META.avaliador,
      curso: META.curso,
      data: META.data,
      hora: META.hora,
      edicao: META.edicao
    };
    localStorage.setItem("saep_respostas_" + aluno.cpf,   JSON.stringify({ ...meta, respostas: gerarRespostas01(aluno.a) }));
    localStorage.setItem("saep02_respostas_" + aluno.cpf, JSON.stringify({ ...meta, respostas: gerarRespostas(aluno.a) }));
  });

  const div = document.getElementById("resultado");
  div.innerHTML = `
    <p class="ok">✓ ${ALUNOS.length} alunos carregados no localStorage com sucesso! (SAEP01 + SAEP02)</p>
    <ul>${ALUNOS.map(a => `<li>${a.nome}</li>`).join("")}</ul>
    <a class="btn" href="saep01/index.html">Abrir formulário SAEP01 →</a>
    <a class="btn" href="saep02/index.html" style="margin-left:12px;">Abrir formulário SAEP02 →</a>
  `;
}
